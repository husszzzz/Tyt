<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة أبطال الـ 4 A</title>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border-top: 4px solid #ff9800; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-bottom: 20px; }
        h1 { color: #ff9800; text-align: center; font-size: 24px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; box-sizing: border-box; }
        button { width: 100%; background: #ff9800; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .list-container { background: #1a1a1a; padding: 15px; border-radius: 15px; }
        .player-row { background: #252525; margin: 8px 0; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; border-right: 3px solid #ff9800; }
        .player-name { font-weight: bold; }
        .player-num { color: #ff9800; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 أبطال الـ 4 A</h1>
        <div class="card">
            <h3 style="margin-top:0">👣 طلب مشاركة</h3>
            <input type="text" id="pName" placeholder="الاسم الثلاثي">
            <input type="text" id="tName" placeholder="اسم الفريق">
            <button onclick="sendData()">إرسال إلى @OM_G9 👣</button>
        </div>
        <div class="list-container">
            <div style="margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px">📋 قائمة الـ 10 المقبولين</div>
            <div id="attendanceList">جاري التحميل...</div>
        </div>
    </div>

    <script>
        const sheetID = "1-9KXtNhckL4-XRewxi15vgHkA7R3GHd6lyd8l0RbKqk";
        const url = https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&range=Q2:Q11;

        function fetchPlayers() {
            fetch(url).then(r => r.text()).then(d => {
                const rows = JSON.parse(d.substring(47).slice(0,-2)).table.rows;
                let h = "";
                rows.forEach((r, i) => {
                    const n = (r.c && r.c[0]) ? r.c[0].v : "بانتظار لاعب...";
                    h += <div class="player-row"><span class="player-name">${n}</span><span class="player-num">#${i+1}</span></div>;
                });
                document.getElementById('attendanceList').innerHTML = h;
            });
        }
        function sendData() {
            const n = document.getElementById('pName').value;
            const t = document.getElementById('tName').value;
            if(!n || !t) return alert("املأ البيانات!");
            window.open(`https://t.me/OM_G9?text=${encodeURIComponent("مشاركة جديدة:\nالاسم: "+n+"\nالفريق: "+t)}`);
        }
        fetchPlayers();
    </script>
</body>
</html>
